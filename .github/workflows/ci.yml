name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # We deliberately allow clippy::pedantic / clippy::nursery (they're
      # opinionated style lints that produce hundreds of warnings on this
      # codebase). Real bugs and clippy::all violations fail the build.
      - run: >-
          cargo clippy --workspace --all-targets --
          -D clippy::all
          -A clippy::pedantic
          -A clippy::nursery
          -A clippy::wildcard_imports

  test:
    name: test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - default
          - experimental
          - realtime
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}
      - name: Build
        run: |
          if [ "${{ matrix.features }}" = "default" ]; then
            cargo build --workspace --all-targets
          else
            cargo build --workspace --all-targets --features ${{ matrix.features }}
          fi
      # Core lib + calibration golden tests. The CLI integration suite
      # uses dummy fixtures the parser rightly rejects and is currently
      # red; gate it back on once those fixtures are real.
      - name: Test
        run: |
          if [ "${{ matrix.features }}" = "default" ]; then
            cargo test -p drone-tuner-core --lib
            cargo test -p drone-tuner-core --test calibration
          else
            cargo test -p drone-tuner-core --lib --features ${{ matrix.features }}
          fi
