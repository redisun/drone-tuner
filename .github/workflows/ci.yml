name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # NOTE: We deliberately do *not* set `RUSTFLAGS: -D warnings` at workflow
  # scope. Cargo appends RUSTFLAGS after the `--` args on the rustc command
  # line, so it overrode the per-job `-A clippy::pedantic` allowlist below
  # and made every pedantic warning fail the build. Clippy strictness is
  # configured per-job via explicit `-D`/`-A` flags instead.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # libudev-dev is required by `libudev-sys` (transitive via `serialport`)
      # for USB serial enumeration. Without it the build fails before clippy
      # ever runs.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      # We deliberately allow clippy::pedantic / clippy::nursery (they're
      # opinionated style lints that produce hundreds of warnings on this
      # codebase). Real bugs and clippy::all violations fail the build.
      - run: >-
          cargo clippy --workspace --all-targets --
          -D clippy::all
          -A clippy::pedantic
          -A clippy::nursery
          -A clippy::wildcard_imports

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: |
          cargo test -p drone-tuner-core --lib
          cargo test -p drone-tuner-core --test calibration
          # Skip the perf/stress tests; they're synthetic-data thrash, not
          # regression guards. The lib + calibration + CLI integration
          # suites cover real behaviour.
          cargo test -p drone-tuner-cli --test command_specific --test integration
