name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # We deliberately allow clippy::pedantic / clippy::nursery (they're
      # opinionated style lints that produce hundreds of warnings on this
      # codebase). Real bugs and clippy::all violations fail the build.
      - run: >-
          cargo clippy --workspace --all-targets --
          -D clippy::all
          -A clippy::pedantic
          -A clippy::nursery
          -A clippy::wildcard_imports

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: |
          cargo test -p drone-tuner-core --lib
          cargo test -p drone-tuner-core --test calibration
          # Skip the perf/stress tests; they're synthetic-data thrash, not
          # regression guards. The lib + calibration + CLI integration
          # suites cover real behaviour.
          cargo test -p drone-tuner-cli --test command_specific --test integration
